<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task List</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <div class="container mt-5">
    <h1 class="mb-4">Task List</h1>

    <!-- Add Task Form -->
    <div class="card mb-4">
      <div class="card-body">
        <h5 class="card-title">Add a New Task</h5>

        <form id="task-form">

          <div class="mb-3">
            <label for="task-title" class="form-label">Task Title</label>
            <input type="text" id="task-title" class="form-control" placeholder="Enter task title" required />
          </div>

          <div class="mb-3">
            <label for="task-priority" class="form-label">Priority</label>
            <select id="task-priority" class="form-select">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Status</label><br/>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="task-status" value="pending" checked />
              <label class="form-check-label">Pending</label>
            </div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="task-status" value="completed" />
              <label class="form-check-label">Completed</label>
            </div>
          </div>

          <button type="submit" class="btn btn-primary">Add Task</button>

        </form>
      </div>
    </div>

    <!-- Task List -->
    <h5>Tasks (<span id="task-count">0</span>)</h5>
    <ul id="task-list" class="list-group mt-2"></ul>

  </div>

  <script src="app.js"></script>
</body>
</html>
